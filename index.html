firebase.initializeApp(firebaseConfig);
const db = firebase.database();

async function fbSaveAndCalcRank(score) {
  const newRef = await db.ref('scores').push({ score, timestamp: Date.now() });
  console.log('[Firebase] push完了, key:', newRef.key);

  await new Promise(r => setTimeout(r, 500));

  const snap = await db.ref('scores').get();
  const allScores = [];
  snap.forEach(child => allScores.push(child.val().score));
  console.log('[Firebase] 取得件数:', allScores.length, '全スコア:', allScores);

  const total = allScores.length;
  const below = allScores.filter(s => s < score).length;
  const topPct = Math.max(1, Math.round(((total - below) / total) * 100));
  const sorted = [...allScores].sort((a, b) => b - a);
  const top10idx = Math.floor(total * 0.1);
  const top10score = sorted[top10idx] ?? sorted[0] ?? 0;

  return { topPct, top10score, total };
}

// ===== ユーティリティ =====
function toHtmlFormula(plain) { return plain.replace(/(\d+)/g,'<sub>$1</sub>'); }
function fmtCharge(c, type) { const s=type==='cation'?'+':'−'; return c===1?s:`${c}${s}`; }
function ionChoiceHTML(ion,charge,type){ return `${toHtmlFormula(ion.formula)}<sup>${fmtCharge(charge,type)}</sup>`; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// 多原子イオン判定：大文字が2つ以上 → 複数元素からなる多原子イオン
function isPolyatomic(formula){ return (formula.match(/[A-Z]/g)||[]).length >= 2; }

function buildCrystalHTML(q,c,a){
  if(c===0&&a===0) return '?';
  const cf=q.crystal.cation.formula, af=q.crystal.anion.formula;
  // 多原子イオンかつ個数2以上のときだけ括弧
  const needBracketC = c>1 && isPolyatomic(cf);
  const needBracketA = a>1 && isPolyatomic(af);
  let h='';
  if(c>0){
    const ch=toHtmlFormula(cf);
    h += needBracketC ? `(${ch})<sub>${c}</sub>` : ch + (c>1?`<sub>${c}</sub>`:'');
  }
  if(a>0){
    const ah=toHtmlFormula(af);
    h += needBracketA ? `(${ah})<sub>${a}</sub>` : ah + (a>1?`<sub>${a}</sub>`:'');
  }
  return h;
}

// ===== 問題生成 =====
function valenceQuestion(ion){
  const correct=ionChoiceHTML(ion,ion.charge,ion.type);
  const other=[1,2,3].filter(c=>c!==ion.charge);
  const ws=ion.type==='cation'?'anion':'cation';
  const decoys=[...shuffle(other).slice(0,2).map(c=>ionChoiceHTML(ion,c,ion.type)),ionChoiceHTML(ion,ion.charge,ws)];
  return{type:'valence',text:`${ion.name}を表す正しい化学式は？`,correct,options:shuffle([correct,...decoys.slice(0,3)])};
}
function crystalQuestion(crystal){
  return{type:'crystal',text:`${crystal.name}の組成式を作れ。`,crystal,cn:crystal.cn,an:crystal.an};
}
function buildQuestions(){
  return shuffle([...shuffle(IONS).slice(0,8).map(valenceQuestion),...shuffle(CRYSTALS).slice(0,7).map(crystalQuestion)]);
}

// ===== ゲーム状態 =====
let questions=[],qIdx=0,score=0,streak=0,maxStreak=0;
let correctCount=0,mistakes=[],times=[],qStartTime=0,answered=false;
let cCnt=0,aCnt=0;

// ===== 画面切り替え =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== ゲーム開始 =====
function startGame(){
  questions=buildQuestions();qIdx=0;score=0;streak=0;maxStreak=0;
  correctCount=0;mistakes=[];times=[];answered=false;
  showScreen('question-screen');
  renderQuestion();
}

function resetGame(){ showScreen('start-screen'); }

// ===== 問題表示 =====
function renderQuestion(){
  answered=false;
  const q=questions[qIdx];
  document.getElementById('progress-bar').style.width=`${(qIdx/questions.length)*100}%`;
  document.getElementById('q-num').textContent=`問題 ${qIdx+1} / ${questions.length}`;
  document.getElementById('score-display').innerHTML=`スコア: ${score}${streak>=2?`<span class="streak-badge">${streak}連続!</span>`:''}`;
  const badge=document.getElementById('q-type-badge');
  if(q.type==='valence'){badge.textContent='価数問題';badge.className='q-type-badge type-valence';}
  else{badge.textContent='組成式の作成';badge.className='q-type-badge type-crystal';}
  document.getElementById('q-text').innerHTML=q.text;
  if(q.type==='valence') renderValence(q);
  else renderCrystal(q);
  qStartTime=Date.now();
}

function renderValence(q){
  document.getElementById('q-body').innerHTML=
    `<div class="choices-grid">${q.options.map(opt=>`<button class="choice-btn" data-val="${encodeURIComponent(opt)}" onclick="answerValence(this)">${opt}</button>`).join('')}</div>
    <div id="result-msg"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題 →</button>`;
}

function answerValence(btn){
  if(answered) return;
  answered=true;
  const chosen=decodeURIComponent(btn.dataset.val);
  const elapsed=(Date.now()-qStartTime)/1000;
  times.push(elapsed);
  const q=questions[qIdx];
  const isCorrect=chosen===q.correct;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(decodeURIComponent(b.dataset.val)===q.correct) b.classList.add('correct');
    else if(b===btn&&!isCorrect) b.classList.add('wrong');
  });
  const msg=document.getElementById('result-msg');
  if(isCorrect){
    streak++;maxStreak=Math.max(maxStreak,streak);
    const pts=100+streak*10+Math.max(0,Math.round(10-elapsed));
    score+=pts;correctCount++;
    msg.innerHTML=`<div class="result-row result-correct">正解！ +${pts}点</div>`;
  } else {
    streak=0;
    mistakes.push({q:q.text,correct:q.correct});
    msg.innerHTML=`<div class="result-row result-wrong">不正解</div>`;
  }
  document.getElementById('score-display').innerHTML=`スコア: ${score}${streak>=2?`<span class="streak-badge">${streak}連続!</span>`:''}`;
  document.getElementById('next-btn').style.display='block';
}

function renderCrystal(q){
  cCnt=0;aCnt=0;
  document.getElementById('q-body').innerHTML=`
    <div class="crystal-formula-display" id="crystal-formula">?</div>
    <div class="ion-controls">
      <div class="ion-row">
        <span class="ion-label">${q.crystal.cation.display}</span>
        <span class="ion-name-small">${q.crystal.cation.name}</span>
        <button class="counter-btn" onclick="adjustCount('c',-1)">−</button>
        <span class="counter-num" id="c-cnt">0</span>
        <button class="counter-btn" onclick="adjustCount('c',1)">＋</button>
      </div>
      <div class="ion-row">
        <span class="ion-label">${q.crystal.anion.display}</span>
        <span class="ion-name-small">${q.crystal.anion.name}</span>
        <button class="counter-btn" onclick="adjustCount('a',-1)">−</button>
        <span class="counter-num" id="a-cnt">0</span>
        <button class="counter-btn" onclick="adjustCount('a',1)">＋</button>
      </div>
    </div>
    <button class="confirm-btn" id="confirm-btn" onclick="answerCrystal()">決定</button>
    <div id="result-msg"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題 →</button>`;
}

function adjustCount(which,delta){
  if(answered) return;
  if(which==='c'){cCnt=Math.max(0,Math.min(6,cCnt+delta));document.getElementById('c-cnt').textContent=cCnt;}
  else{aCnt=Math.max(0,Math.min(6,aCnt+delta));document.getElementById('a-cnt').textContent=aCnt;}
  document.getElementById('crystal-formula').innerHTML=buildCrystalHTML(questions[qIdx],cCnt,aCnt);
}

function answerCrystal(){
  if(answered) return;
  answered=true;
  const elapsed=(Date.now()-qStartTime)/1000;
  times.push(elapsed);
  const q=questions[qIdx];
  const isCorrect=cCnt===q.cn&&aCnt===q.an;
  document.getElementById('confirm-btn').disabled=true;
  const msg=document.getElementById('result-msg');
  if(isCorrect){
    streak++;maxStreak=Math.max(maxStreak,streak);
    const pts=100+streak*10+Math.max(0,Math.round(10-elapsed));
    score+=pts;correctCount++;
    msg.innerHTML=`<div class="result-row result-correct">正解！ +${pts}点</div>`;
  } else {
    streak=0;
    mistakes.push({q:q.text,correctHTML:buildCrystalHTML(q,q.cn,q.an)});
    msg.innerHTML=`<div class="result-row result-wrong">不正解</div>`;
  }
  document.getElementById('score-display').innerHTML=`スコア: ${score}`;
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=questions.length){showResults();return;}
  renderQuestion();
}

// ===== 結果 & Firebase保存 =====
async function showResults(){
  showScreen('result-screen');
  const avgTime=times.length?Math.round(times.reduce((a,b)=>a+b,0)/times.length):0;
  document.getElementById('final-score').textContent=score;
  document.getElementById('stat-correct').textContent=`${correctCount}/15`;
  document.getElementById('stat-streak').textContent=maxStreak;
  document.getElementById('stat-time').textContent=`${avgTime}s`;

  // Firebase保存 & 上位%計算
  document.getElementById('rank-info').innerHTML='<small style="color:#aaa">集計中...</small>';
  try {
    const { topPct, top10score, total } = await fbSaveAndCalcRank(score);
    let rankText = `<span class="rank-pct">上位 ${topPct}%</span> の成績`;
    rankText += `<br><small>（全 ${total} 件中）</small>`;
    if(score < top10score){
      rankText += `<br><small>上位10%まであと <strong>${top10score - score}</strong> 点</small>`;
    } else {
      rankText += `<br><small>🎉 上位10%達成！</small>`;
    }
    document.getElementById('rank-info').innerHTML = rankText;
  } catch(e) {
    const msg = e.message || String(e);
    const hint = msg.includes('PERMISSION_DENIED')
      ? 'Firebaseのセキュリティルールで書き込みが拒否されています。コンソールでルールを確認してください。'
      : msg.includes('different region') || msg.includes('firebaseio')
      ? 'databaseURLのリージョンが違います。'
      : msg;
    document.getElementById('rank-info').innerHTML=`<small style="color:#c00">エラー: ${hint}</small>`;
    console.error(e);
  }

  // 間違い表示
  const ms=document.getElementById('mistakes-section');
  if(mistakes.length===0){
    ms.innerHTML='<div style="text-align:center;color:#888;padding:1rem;">全問正解！素晴らしい！</div>';
  } else {
    ms.innerHTML=`<div class="mistakes-title">間違えた問題 (${mistakes.length}問)</div>`
      +mistakes.map(m=>`<div class="mistake-item"><div class="mistake-q">${m.q}</div><div class="mistake-ans">正答: ${m.correctHTML||m.correct}</div></div>`).join('');
  }
}
</script>
</body>
</html>
